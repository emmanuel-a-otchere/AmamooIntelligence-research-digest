name: Sync upstream

# Keeps this fork aligned with open-jarvis/OpenJarvis.
# Every Monday 06:00 UTC it opens (or updates) a PR titled
# "chore(sync): upstream <short-sha> into main". The PR is auto-generated
# from a bot branch; humans review before merge.

on:
  schedule:
    # Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a sync even if upstream has not advanced"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "upstream-sync-bot"
          git config user.email "upstream-sync-bot@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/open-jarvis/OpenJarvis.git
          git fetch upstream --tags

      - name: Check whether upstream has new commits
        id: check
        run: |
          # Compare local main to upstream/main. If they're equal, skip.
          LOCAL=$(git rev-parse origin/main)
          UPSTREAM=$(git rev-parse upstream/main)
          echo "local=$LOCAL"
          echo "upstream=$UPSTREAM"
          if [ "$LOCAL" = "$UPSTREAM" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "in_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_sync=false" >> "$GITHUB_OUTPUT"
            SHORT=$(echo "$UPSTREAM" | cut -c1-7)
            echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into bot branch
        if: steps.check.outputs.in_sync == 'false'
        run: |
          BRANCH="upstream-sync/${{ steps.check.outputs.short_sha }}"
          git checkout -B "$BRANCH" origin/main
          git merge upstream/main --no-ff -m "chore(sync): upstream ${{ steps.check.outputs.short_sha }} into main"
          git push origin "$BRANCH" --force-with-lease

      - name: Open or update PR
        if: steps.check.outputs.in_sync == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.check.outputs.short_sha }}';
            const branch = `upstream-sync/${sha}`;
            const title = `chore(sync): upstream ${sha} into main`;
            const body = [
              'Automated weekly sync from [`open-jarvis/OpenJarvis`](https://github.com/open-jarvis/OpenJarvis).',
              '',
              `Upstream HEAD: \`${sha}\`.`,
              '',
              'Review checklist:',
              '- [ ] CI green on this PR',
              '- [ ] `docs/UPSTREAM-SYNC.md` still applies to the merged range',
              '- [ ] No surprise changes in `pyproject.toml` / `uv.lock`',
              '- [ ] Downstream specializations notified (if any are tracked)',
              '',
              'Merge with **"Create a merge commit"** to preserve upstream authorship.',
            ].join('\n');

            // Look for an existing open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });

            if (prs.length > 0) {
              core.info(`PR already open: #${prs[0].number} — leaving for human review.`);
              return;
            }

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              head: branch,
              base: 'main',
              body,
              maintainer_can_modify: true,
            });

      - name: Nothing to do
        if: steps.check.outputs.in_sync == 'true'
        run: echo "Already in sync with upstream/main — no PR opened."